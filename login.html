<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SaviraNest | Login – Your Nest Away From Home</title>
    <link rel="icon" href="assets/image/favicon.ico" type="image/x-icon">
    <script src="assets/js/tailwindcdn.js"></script>
    <link href="assets/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @font-face {
            font-family: 'Aptos';
            src: url('/Aptos/Aptos.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: 'Aptos', 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            color: #1e293b;
            line-height: 1.5;
            font-size: 0.9rem;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .split-layout {
            display: flex;
            min-height: 100vh;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        .left-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .right-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 2rem;
            z-index: 20;
        }

        .logo-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            color: white;
        }

        .brand-logo {
            width: 600px;
            height: auto;
            margin-bottom: 1.5rem;
            filter: brightness(0) invert(1);
        }

        .brand-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .brand-tagline {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }

        .feature-list {
            text-align: left;
            list-style: none;
            margin-top: 1rem;
        }

        .feature-list li {
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.9rem;
        }

        .feature-list i {
            width: 1.25rem;
            color: #f97316;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 460px;
            transition: transform 0.3s ease;
        }

        @media (min-width: 1024px) {
            .right-side {
                justify-content: flex-start;
                padding-left: 0;
            }

            .form-card {
                transform: translateX(-40px);
                margin-left: -20px;
            }

            .left-side {
                margin-right: -20px;
                justify-content: flex-end;
                padding-right: 0;
            }
        }

        @media (max-width: 1024px) {
            .split-layout {
                flex-direction: column;
            }

            .left-side {
                display: none;
            }

            .right-side {
                justify-content: center;
                padding: 2rem;
            }

            .form-card {
                transform: none;
                margin: 0 auto;
            }
        }

        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2);
            border-color: #f97316;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div class="split-layout">
        <!-- Left Side: Branding -->
        <div class="left-side">
            <div class="logo-container">
                <img class="brand-logo" src="assets/image/savira_nest_logo.webp" alt="SaviraNest Logo">
                <!-- <div class="brand-title">SaviraNest</div>
            <div class="brand-tagline">Your Nest Away From Home</div>
            <ul class="feature-list">
                <li><i class="fas fa-home"></i> Unique stays – beach, safari, urban</li>
                <li><i class="fas fa-water"></i> Curated local experiences</li>
                <li><i class="fas fa-campground"></i> Quality outdoor rentals</li>
                <li><i class="fas fa-shield-alt"></i> Secure & seamless bookings</li>
            </ul> -->
            </div>
        </div>

        <!-- Right Side: Login Card -->
        <div class="right-side">
            <div class="form-card p-6 fade-in">
                <h2 class="text-2xl font-bold text-white text-center mb-2">Welcome Back</h2>
                <p class="text-gray-300 text-center text-sm mb-6">Log in to continue your adventure</p>

                <form id="loginForm">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-200 mb-2"><i
                                class="fas fa-envelope mr-2 text-orange-400"></i>Email Address</label>
                        <input type="email" id="loginEmail" required placeholder="hello@saviranest.co.ke"
                            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:border-orange-500 input-focus transition-all">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-200 mb-2"><i
                                class="fas fa-lock mr-2 text-orange-400"></i>Password</label>
                        <div class="relative">
                            <input type="password" id="loginPassword" required placeholder="••••••••"
                                class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:border-orange-500 input-focus transition-all pr-12">
                            <button type="button" id="toggleLoginPassword"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-orange-400"><i
                                    class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="text-right mb-4">
                        <a href="forgot-password.html" class="text-xs text-orange-400 hover:underline">Forgot
                            password?</a>
                    </div>
                    <button type="submit"
                        class="w-full bg-gradient-to-r from-orange-500 to-amber-600 text-white font-semibold py-3 rounded-xl hover:shadow-lg hover:shadow-orange-500/30 transition-all duration-300 transform hover:scale-[1.02] flex items-center justify-center gap-2"><i
                            class="fas fa-arrow-right-to-bracket"></i> Sign In</button>

                    <div class="divider">
                        <div class="divider-line"></div>
                        <span class="text-gray-400 text-xs">or continue with</span>
                        <div class="divider-line"></div>
                    </div>
                    <button type="button" id="googleLoginBtn"
                        class="w-full bg-white/10 border border-white/20 rounded-xl py-3 flex items-center justify-center gap-2 text-white hover:bg-white/20 transition"><i
                            class="fab fa-google text-red-400"></i> Sign in with Google</button>

                    <!-- Link to Signup -->
                    <div class="text-center mt-5 text-xs text-gray-400">
                        Don’t have an account?
                        <a href="signup.html" class="text-orange-400 hover:underline">Sign up</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Forgot password modal trigger (simple alert in demo) -->
    <div id="forgotModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm items-center justify-center z-50">
    </div>

    <script>
        // Login form handler
        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value.trim();
            const pwd = document.getElementById('loginPassword').value;

            if (email && pwd) {
                // Optional alert
                alert(`🔐 Welcome back ${email}!`);

                // ✅ Redirect to dashboard
                window.location.href = 'admin/dashboard.html'; // adjust path if needed
            } else {
                alert('Please enter both email and password.');
            }
        });

        // Toggle password visibility
        document.getElementById('toggleLoginPassword').addEventListener('click', () => {
            const input = document.getElementById('loginPassword');
            const type = input.type === 'password' ? 'text' : 'password';
            input.type = type;
            document.getElementById('toggleLoginPassword').innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });

        // Google sign-in placeholder
        document.getElementById('googleLoginBtn').addEventListener('click', () => {
            alert('🌐 Google Sign-In will be available after full launch.');
        });
    </script>
</body>

</html>
