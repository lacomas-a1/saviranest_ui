<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SaviraNest Admin | Manage Bookings</title>

    <link rel="icon" href="assets/logo/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'Aptos';
            src: url('/Aptos/Aptos.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --ocean-blue: #1E88E5;
            --deep-navy: #0B1F3A;
            --sand-beige: #F4E7D3;
            --orange: #E07C3C;
            --sunrise-gold: #F9A826;
            --support-green: #059669;
            --white: #FFFFFF;
            --light: #F8F9FA;
            --sidebar-width: 280px;
            --header-height: 70px;
        }

        body {
            font-family: 'Aptos', 'Inter', sans-serif;
            background: #f1f5f9;
            color: var(--deep-navy);
            overflow: hidden;
            height: 100vh;
        }

        /* ADMIN LAYOUT */
        .admin-wrapper {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR - FIXED POSITION */
        .admin-sidebar {
            width: var(--sidebar-width);
            background: var(--white);
            border-right: 1px solid #e2e8f0;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.02);
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 1.5rem 1.5rem 1rem;
            border-bottom: 1px solid #eef2ff;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sidebar-header img {
            height: 55px;
            margin-bottom: 8px;
        }

        .sidebar-header h4 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--deep-navy);
            margin-bottom: 12px;
        }

        .login-persona {
            background: #f8fafc;
            border-radius: 28px;
            padding: 12px 16px;
            margin: 16px;
            text-align: center;
        }

        .login-persona .avatar-sm {
            width: 48px;
            height: 48px;
            background: var(--sunrise-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--deep-navy);
        }

        .login-persona .name {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .login-persona .role {
            font-size: 0.7rem;
            color: #64748b;
            margin-bottom: 8px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #e07c3c;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }

        .logout-btn:hover {
            background: #fef2e8;
            border-color: var(--orange);
        }

        .sidebar-nav {
            flex: 1;
            padding: 1.5rem 1rem;
        }

        .nav-item-admin {
            margin-bottom: 0.5rem;
        }

        .nav-link-admin {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.75rem 1rem;
            border-radius: 16px;
            color: #475569;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-link-admin i {
            width: 24px;
            font-size: 1.2rem;
            color: var(--ocean-blue);
        }

        .nav-link-admin:hover,
        .nav-link-admin.active {
            background: rgba(30, 136, 229, 0.08);
            color: var(--ocean-blue);
        }

        .nav-link-admin.active {
            background: rgba(30, 136, 229, 0.12);
            font-weight: 600;
            color: var(--ocean-blue);
        }

        /* MAIN CONTENT - scrollable */
        .admin-main {
            flex: 1;
            margin-left: var(--sidebar-width);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
            background: #f1f5f9;
        }

        .admin-topbar {
            background: var(--white);
            padding: 0 2rem;
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 99;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--deep-navy);
            cursor: pointer;
            margin-right: auto;
        }

        .dashboard-content {
            padding: 2rem;
        }

        /* Table & filters */
        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .search-filter {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-filter input,
        .search-filter select {
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
            background: white;
            font-family: inherit;
        }

        .btn-primary-admin {
            background: var(--sunrise-gold);
            border: none;
            color: var(--deep-navy);
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-primary-admin:hover {
            background: #e6950e;
        }

        .data-table {
            width: 100%;
            background: white;
            border-radius: 28px;
            overflow: hidden;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid #eef2ff;
        }

        .data-table th {
            background: #f8fafc;
            font-weight: 600;
        }

        .data-table tr:hover {
            background: #fefce8;
        }

        .btn-icon {
            background: transparent;
            border: none;
            color: var(--ocean-blue);
            cursor: pointer;
            margin: 0 4px;
            font-size: 1rem;
        }

        .btn-icon.delete {
            color: #e07c3c;
        }

        .btn-icon:hover {
            opacity: 0.7;
        }

        .badge-status {
            background: #e6f7e6;
            color: var(--support-green);
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }

        .badge-pending {
            background: #fff3e0;
            color: #e67e22;
        }

        .badge-completed {
            background: #e0f2fe;
            color: #0284c7;
        }

        .badge-cancelled {
            background: #fee2e2;
            color: #dc2626;
        }

        /* Modal */
        .modal-content {
            border-radius: 28px;
            border: none;
        }

        .modal-header {
            background: var(--deep-navy);
            color: white;
            border-radius: 28px 28px 0 0;
        }

        .modal-header .btn-close {
            filter: brightness(0) invert(1);
        }

        .form-control,
        .form-select {
            border-radius: 40px;
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
        }

        @media (max-width: 992px) {
            .admin-sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 1050;
            }

            .admin-sidebar.open {
                transform: translateX(0);
            }

            .admin-main {
                margin-left: 0;
            }

            .menu-toggle {
                display: block;
            }
        }

        @media (max-width: 768px) {
            .data-table {
                display: block;
                overflow-x: auto;
            }

            .actions-bar {
                flex-direction: column;
                align-items: stretch;
            }
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1040;
        }

        .overlay.show {
            display: block;
        }
    </style>
</head>

<body>
    <div class="admin-wrapper">
        <!-- Sidebar (fixed) -->
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-header">
                <img src="../assets/image/savira_nest_logo.png" alt="SaviraNest Logo">
                <h4>SaviraNest Admin</h4>
            </div>
            <div class="sidebar-nav">
                <div class="nav-item-admin">
                    <a href="dashboard.html" class="nav-link-admin">
                        <i class="fas fa-tachometer-alt"></i> Dashboard
                    </a>
                </div>
                <div class="nav-item-admin">
                    <a href="stay.html" class="nav-link-admin">
                        <i class="fas fa-building"></i> Stays
                    </a>
                </div>
                <div class="nav-item-admin">
                    <a href="experience.html" class="nav-link-admin">
                        <i class="fas fa-compass"></i> Experiences
                    </a>
                </div>
                <div class="nav-item-admin">
                    <a href="bookings.html" class="nav-link-admin active">
                        <i class="fas fa-calendar-check"></i> Bookings
                    </a>
                </div>
                <div class="nav-item-admin">
                    <a href="guests.html" class="nav-link-admin">
                        <i class="fas fa-users"></i> Guests
                    </a>
                </div>
                <div class="nav-item-admin"><a href="transactions.html" class="nav-link-admin"><i
                            class="fas fa-credit-card"></i> Transactions</a></div>
                <div class="nav-item-admin"><a href="reports.html" class="nav-link-admin"><i
                            class="fas fa-chart-line"></i> Reports</a></div>
                <div class="nav-item-admin">
                    <a href="settings.html" class="nav-link-admin">
                        <i class="fas fa-cog"></i> Settings
                    </a>
                </div>
            </div>
            <div class="login-persona">
                <div class="avatar-sm">MA</div>
                <div class="name">Michael Amadi</div>
                <div class="role">Super Administrator</div>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <!-- Main content -->
        <main class="admin-main">
            <div class="admin-topbar">
                <button class="menu-toggle" id="menuToggleBtn"><i class="fas fa-bars"></i></button>
            </div>

            <div class="dashboard-content">
                <div class="actions-bar">
                    <h2>Manage Bookings</h2>
                    <div style="display: flex; gap: 12px;">
                        <div class="search-filter">
                            <input type="text" id="searchInput" placeholder="Search by guest or property...">
                            <select id="statusFilter">
                                <option value="all">All Statuses</option>
                                <option value="confirmed">Confirmed</option>
                                <option value="pending">Pending</option>
                                <option value="completed">Completed</option>
                                <option value="cancelled">Cancelled</option>
                            </select>
                        </div>
                        <button class="btn-primary-admin" data-bs-toggle="modal" data-bs-target="#addBookingModal">
                            <i class="fas fa-plus"></i> Add New Booking
                        </button>
                    </div>
                </div>

                <div style="overflow-x: auto;">
                    <table class="data-table" id="bookingsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Guest Name</th>
                                <th>Property</th>
                                <th>Check In</th>
                                <th>Check Out</th>
                                <th>Status</th>
                                <th>Amount (KES)</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="bookingsTableBody">
                            <!-- Data loaded via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <div class="overlay" id="sidebarOverlay"></div>

    <!-- Add Booking Modal -->
    <div class="modal fade" id="addBookingModal" tabindex="-1" aria-labelledby="addBookingModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-plus-circle"></i> Add New Booking</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="addBookingForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Guest Name *</label>
                                <input type="text" class="form-control" id="bookingGuest" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Property / Stay *</label>
                                <input type="text" class="form-control" id="bookingProperty" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Check In Date *</label>
                                <input type="date" class="form-control" id="bookingCheckIn" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Check Out Date *</label>
                                <input type="date" class="form-control" id="bookingCheckOut" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Status *</label>
                                <select class="form-select" id="bookingStatus" required>
                                    <option value="confirmed">Confirmed</option>
                                    <option value="pending">Pending</option>
                                    <option value="completed">Completed</option>
                                    <option value="cancelled">Cancelled</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Total Amount (KES) *</label>
                                <input type="number" class="form-control" id="bookingAmount" required>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-outline" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn-primary-travel" id="saveBookingBtn">Save Booking</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Booking Modal -->
    <div class="modal fade" id="editBookingModal" tabindex="-1" aria-labelledby="editBookingModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-edit"></i> Edit Booking</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editBookingForm">
                        <input type="hidden" id="editBookingId">
                        <div class="row g-3">
                            <div class="col-md-6"><label>Guest Name</label><input type="text" class="form-control"
                                    id="editGuest"></div>
                            <div class="col-md-6"><label>Property</label><input type="text" class="form-control"
                                    id="editProperty"></div>
                            <div class="col-md-6"><label>Check In</label><input type="date" class="form-control"
                                    id="editCheckIn"></div>
                            <div class="col-md-6"><label>Check Out</label><input type="date" class="form-control"
                                    id="editCheckOut"></div>
                            <div class="col-md-6"><label>Status</label><select class="form-select" id="editStatus">
                                    <option value="confirmed">Confirmed</option>
                                    <option value="pending">Pending</option>
                                    <option value="completed">Completed</option>
                                    <option value="cancelled">Cancelled</option>
                                </select></div>
                            <div class="col-md-6"><label>Amount (KES)</label><input type="number" class="form-control"
                                    id="editAmount"></div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-outline" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn-primary-travel" id="updateBookingBtn">Update Booking</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Sample initial bookings data
        let bookings = [
            { id: 1, guestName: "James K.", property: "Watamu Beach Resort", checkIn: "2025-06-10", checkOut: "2025-06-15", status: "confirmed", amount: 42500 },
            { id: 2, guestName: "Sarah M.", property: "Mara Serena Lodge", checkIn: "2025-05-20", checkOut: "2025-05-23", status: "completed", amount: 66000 },
            { id: 3, guestName: "David O.", property: "Lamu Swahili House", checkIn: "2025-07-01", checkOut: "2025-07-04", status: "pending", amount: 28500 },
            { id: 4, guestName: "Linda W.", property: "Diani Reef Resort", checkIn: "2025-06-25", checkOut: "2025-06-28", status: "confirmed", amount: 36000 },
            { id: 5, guestName: "Michael K.", property: "The Sands at Nomad", checkIn: "2025-06-18", checkOut: "2025-06-20", status: "completed", amount: 28000 },
        ];
        let nextBookingId = 6;

        // Helper: status badge class
        function getStatusBadgeClass(status) {
            if (status === 'confirmed') return 'badge-status';
            if (status === 'pending') return 'badge-status badge-pending';
            if (status === 'completed') return 'badge-status badge-completed';
            if (status === 'cancelled') return 'badge-status badge-cancelled';
            return 'badge-status';
        }

        function getStatusDisplay(status) {
            return status.charAt(0).toUpperCase() + status.slice(1);
        }

        // Render table
        function renderBookings() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            const filtered = bookings.filter(b => {
                const matchSearch = b.guestName.toLowerCase().includes(searchTerm) || b.property.toLowerCase().includes(searchTerm);
                const matchStatus = statusFilter === 'all' || b.status === statusFilter;
                return matchSearch && matchStatus;
            });
            const tbody = document.getElementById('bookingsTableBody');
            tbody.innerHTML = '';
            filtered.forEach(b => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = b.id;
                row.insertCell(1).innerHTML = `<strong>${b.guestName}</strong>`;
                row.insertCell(2).innerText = b.property;
                row.insertCell(3).innerText = b.checkIn;
                row.insertCell(4).innerText = b.checkOut;
                row.insertCell(5).innerHTML = `<span class="${getStatusBadgeClass(b.status)}">${getStatusDisplay(b.status)}</span>`;
                row.insertCell(6).innerText = `KES ${b.amount.toLocaleString()}`;
                const actions = row.insertCell(7);
                actions.innerHTML = `<button class="btn-icon edit-btn" data-id="${b.id}"><i class="fas fa-edit"></i></button>
                                     <button class="btn-icon delete-btn" data-id="${b.id}"><i class="fas fa-trash-alt"></i></button>`;
            });
            // attach event listeners
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => editBooking(parseInt(btn.dataset.id)));
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.dataset.id);
                    if (confirm('Delete this booking permanently?')) {
                        bookings = bookings.filter(b => b.id !== id);
                        renderBookings();
                        alert('Booking deleted.');
                    }
                });
            });
        }

        function editBooking(id) {
            const booking = bookings.find(b => b.id === id);
            if (!booking) return;
            document.getElementById('editBookingId').value = booking.id;
            document.getElementById('editGuest').value = booking.guestName;
            document.getElementById('editProperty').value = booking.property;
            document.getElementById('editCheckIn').value = booking.checkIn;
            document.getElementById('editCheckOut').value = booking.checkOut;
            document.getElementById('editStatus').value = booking.status;
            document.getElementById('editAmount').value = booking.amount;
            const editModal = new bootstrap.Modal(document.getElementById('editBookingModal'));
            editModal.show();
        }

        // Add booking
        document.getElementById('saveBookingBtn').addEventListener('click', () => {
            const guestName = document.getElementById('bookingGuest').value.trim();
            const property = document.getElementById('bookingProperty').value.trim();
            const checkIn = document.getElementById('bookingCheckIn').value;
            const checkOut = document.getElementById('bookingCheckOut').value;
            const status = document.getElementById('bookingStatus').value;
            const amount = parseFloat(document.getElementById('bookingAmount').value);

            if (!guestName || !property || !checkIn || !checkOut || !amount) {
                alert('Please fill all required fields.');
                return;
            }
            if (new Date(checkIn) >= new Date(checkOut)) {
                alert('Check-out date must be after check-in date.');
                return;
            }
            const newBooking = { id: nextBookingId++, guestName, property, checkIn, checkOut, status, amount };
            bookings.push(newBooking);
            renderBookings();
            document.getElementById('addBookingForm').reset();
            bootstrap.Modal.getInstance(document.getElementById('addBookingModal')).hide();
            alert('Booking added successfully!');
        });

        // Update booking
        document.getElementById('updateBookingBtn').addEventListener('click', () => {
            const id = parseInt(document.getElementById('editBookingId').value);
            const index = bookings.findIndex(b => b.id === id);
            if (index !== -1) {
                const checkIn = document.getElementById('editCheckIn').value;
                const checkOut = document.getElementById('editCheckOut').value;
                if (new Date(checkIn) >= new Date(checkOut)) {
                    alert('Check-out date must be after check-in date.');
                    return;
                }
                bookings[index].guestName = document.getElementById('editGuest').value;
                bookings[index].property = document.getElementById('editProperty').value;
                bookings[index].checkIn = checkIn;
                bookings[index].checkOut = checkOut;
                bookings[index].status = document.getElementById('editStatus').value;
                bookings[index].amount = parseFloat(document.getElementById('editAmount').value);
                renderBookings();
                bootstrap.Modal.getInstance(document.getElementById('editBookingModal')).hide();
                alert('Booking updated.');
            }
        });

        // Filters
        document.getElementById('searchInput').addEventListener('input', renderBookings);
        document.getElementById('statusFilter').addEventListener('change', renderBookings);

        // Sidebar and logout
        const menuBtn = document.getElementById('menuToggleBtn');
        const sidebar = document.getElementById('adminSidebar');
        const overlay = document.getElementById('sidebarOverlay');
        function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); document.body.style.overflow = 'hidden'; }
        function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); document.body.style.overflow = ''; }
        menuBtn.addEventListener('click', openSidebar);
        overlay.addEventListener('click', closeSidebar);
        window.addEventListener('resize', () => { if (window.innerWidth > 992 && sidebar.classList.contains('open')) closeSidebar(); });
        document.getElementById('logoutBtn').addEventListener('click', () => alert('Logout demo'));

        // Initial render
        renderBookings();
    </script>
    <style>
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--orange);
