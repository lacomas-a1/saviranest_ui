<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SaviraNest | Forgot Password – Reset Your Account</title>
    <link rel="icon" href="assets/image/favicon.ico" type="image/x-icon">
    <script src="assets/js/tailwindcdn.js"></script>
    <link href="assets/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @font-face {
            font-family: 'Aptos';
            src: url('/Aptos/Aptos.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: 'Aptos', 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            color: #1e293b;
            line-height: 1.5;
            font-size: 0.9rem;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .split-layout {
            display: flex;
            min-height: 100vh;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        .left-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .right-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 2rem;
            z-index: 20;
        }

        .logo-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            color: white;
        }

        .brand-logo {
            width: 600px;
            height: auto;
            margin-bottom: 1.5rem;
            filter: brightness(0) invert(1);
        }

        .form-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 460px;
            transition: transform 0.3s ease;
        }

        @media (min-width: 1024px) {
            .right-side {
                justify-content: flex-start;
                padding-left: 0;
            }

            .form-card {
                transform: translateX(-40px);
                margin-left: -20px;
            }

            .left-side {
                margin-right: -20px;
                justify-content: flex-end;
                padding-right: 0;
            }
        }

        @media (max-width: 1024px) {
            .split-layout {
                flex-direction: column;
            }

            .left-side {
                display: none;
            }

            .right-side {
                justify-content: center;
                padding: 2rem;
            }

            .form-card {
                transform: none;
                margin: 0 auto;
            }
        }

        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2);
            border-color: #f97316;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-msg {
            color: #f87171;
            font-size: 0.7rem;
            margin-top: 4px;
            display: none;
        }

        .success-msg {
            color: #4ade80;
            font-size: 0.8rem;
            margin-top: 8px;
            display: none;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="split-layout">
        <!-- Left Side: Branding (only logo) -->
        <div class="left-side">
            <div class="logo-container">
                <img class="brand-logo" src="assets/image/savira_nest_logo.webp" alt="SaviraNest Logo">
            </div>
        </div>

        <!-- Right Side: Forgot Password Card -->
        <div class="right-side">
            <div class="form-card p-6 fade-in">
                <div class="text-center mb-2">
                    <i class="fas fa-key text-orange-400 text-3xl mb-2"></i>
                    <h2 class="text-2xl font-bold text-white">Forgot Password?</h2>
                </div>
                <p class="text-gray-300 text-center text-sm mb-6">Enter your email address and we'll send you a password
                    reset link.</p>

                <form id="forgotForm">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-200 mb-2"><i
                                class="fas fa-envelope mr-2 text-orange-400"></i>Email Address</label>
                        <input type="email" id="resetEmail" required placeholder="hello@saviranest.co.ke"
                            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:border-orange-500 input-focus transition-all">
                        <div class="error-msg" id="emailError">Please enter a valid email address</div>
                    </div>
                    <button type="submit"
                        class="w-full bg-gradient-to-r from-orange-500 to-amber-600 text-white font-semibold py-3 rounded-xl hover:shadow-lg hover:shadow-orange-500/30 transition-all duration-300 transform hover:scale-[1.02] flex items-center justify-center gap-2"><i
                            class="fas fa-paper-plane"></i> Send Reset Link</button>
                    <div class="success-msg" id="successMsg"><i class="fas fa-check-circle mr-1"></i> Reset link sent!
                        Check your email.</div>
                    <div class="text-center mt-5 text-xs text-gray-400">
                        Remember your password? <a href="login.html" class="text-orange-400 hover:underline">Back to
                            Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('forgotForm');
        const emailInput = document.getElementById('resetEmail');
        const emailError = document.getElementById('emailError');
        const successMsg = document.getElementById('successMsg');

        function isValidEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        emailInput.addEventListener('input', () => {
            if (!isValidEmail(emailInput.value.trim())) emailError.style.display = 'block';
            else emailError.style.display = 'none';
            successMsg.style.display = 'none';
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            if (!isValidEmail(email)) {
                emailError.style.display = 'block';
                return;
            }
            emailError.style.display = 'none';
            // Simulate sending reset link
            successMsg.style.display = 'block';
            // Optionally clear the form or keep it; after 3 seconds we could redirect
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 3000);
        });
    </script>
</body>

</html>
